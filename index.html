<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff5f6d,#ffc371,#7f7fd5,#86a8e7);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

.card{
width:90%;
max-width:380px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
text-align:center;
color:white;
box-shadow:0 0 30px rgba(255,255,255,.25);
animation:fade 1.5s;
z-index:5;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-size:2.1rem;
margin-bottom:10px;
animation:pop 1s;
}

@keyframes pop{
0%{transform:scale(.5);}
80%{transform:scale(1.1);}
100%{transform:scale(1);}
}

p{
font-size:15px;
line-height:1.7;
margin-top:15px;
}

button{
margin-top:25px;
padding:14px 35px;
border:none;
border-radius:50px;
font-size:16px;
background:white;
color:#ff4081;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 20px white;
}

#message{
margin-top:20px;
font-size:18px;
font-weight:bold;
display:none;
animation:fade 1s;
}

.balloon{
position:absolute;
bottom:-200px;
width:55px;
height:70px;
border-radius:50%;
animation:float linear infinite;
}

.balloon:after{
content:"";
position:absolute;
left:27px;
top:70px;
height:70px;
width:2px;
background:white;
}

@keyframes float{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}

@media(max-width:500px){

.card{
padding:25px;
}

h1{
font-size:1.8rem;
}

p{
font-size:14px;
}

button{
width:100%;
}

}

</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="card">

<h1>🎂 Happy Birthday! 🎉</h1>

<p>
Wishing you endless happiness,
countless smiles,
and all the success your heart desires.
May this year bring beautiful memories,
new adventures,
and dreams come true. ❤️
</p>

<button onclick="celebrate()">
🎁 Open Your Surprise
</button>

<div id="message">
✨ Have the most amazing birthday ever! 🎂🥳❤️
</div>

</div>

<script>

// Balloons

const colors=["#ff4d6d","#4dabf7","#ffd43b","#69db7c","#f783ff"];

for(let i=0;i<18;i++){

let b=document.createElement("div");
b.className="balloon";

b.style.left=Math.random()*100+"vw";
b.style.background=colors[Math.floor(Math.random()*colors.length)];

b.style.animationDuration=(8+Math.random()*6)+"s";
b.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(b);

}

// Confetti

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let pieces=[];

for(let i=0;i<220;i++){

pieces.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*8+3,
d:Math.random()*220,
color:`hsl(${Math.random()*360},100%,60%)`,
tilt:Math.random()*10,
tiltAngle:0,
tiltAngleIncrement:Math.random()*0.08+0.04

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{

ctx.beginPath();

ctx.lineWidth=p.r;

ctx.strokeStyle=p.color;

ctx.moveTo(p.x+p.tilt,p.y);

ctx.lineTo(p.x,p.y+p.tilt);

ctx.stroke();

});

update();

requestAnimationFrame(draw);

}

function update(){

pieces.forEach(p=>{

p.tiltAngle+=p.tiltAngleIncrement;

p.y+=(Math.cos(p.d)+3+p.r/2)/2;

p.x+=Math.sin(p.d);

p.tilt=Math.sin(p.tiltAngle)*15;

if(p.y>canvas.height){

p.y=-20;
p.x=Math.random()*canvas.width;

}

});

}

draw();

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

});

function celebrate(){

document.getElementById("message").style.display="block";

for(let i=0;i<50;i++){

pieces.push({

x:Math.random()*canvas.width,
y:-20,
r:Math.random()*8+4,
d:Math.random()*220,
color:`hsl(${Math.random()*360},100%,60%)`,
tilt:Math.random()*10,
tiltAngle:0,
tiltAngleIncrement:Math.random()*0.1

});

}

}

</script>

</body>
</html>
